name: Publish a release of Cyz2Json

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string
      reason:
        description: 'Reason for release'
        required: false
        default: 'Release latest updates'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Install OpenCvSharp dependencies for Linux
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libtesseract-dev \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libswscale-dev \
          libopenexr-dev \
          libtiff-dev \
          patchelf

    - name: Get release version number
      id: version
      shell: bash
      run: |
        VERSION="${{ github.event.inputs.version }}"
        VERSION="${VERSION#v}"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"
        
    - name: Restore dependencies and Build
      shell: bash
      run: |
        dotnet restore -p:Version=${{ steps.version.outputs.version }}
        dotnet build --no-restore -p:OutputPath=./bin/ -p:Version=${{ steps.version.outputs.version }}
      
    - name: Set RID
      id: set-rid
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest) echo "rid=win-x64" >> $GITHUB_OUTPUT ;;
          ubuntu-latest) echo "rid=linux-x64" >> $GITHUB_OUTPUT ;;
          macos-latest)
            if [ "$(uname -m)" = "arm64" ]; then
              echo "rid=osx-arm64" >> $GITHUB_OUTPUT
            else
              echo "rid=osx-x64" >> $GITHUB_OUTPUT
            fi
            ;;
        esac
        
    - name: Publish
      shell: bash
      run: |
        dotnet publish \
          -c Release \
          -r ${{ steps.set-rid.outputs.rid }} \
          --sc true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishReadyToRun=true \
          -p:Version=${{ steps.version.outputs.version }} \
          -p:OutputPath=./bin/${{ steps.set-rid.outputs.rid }}/publish/
          
    - name: Copy Licence
      shell: bash
      run: |
        publish_dir="Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish"
        cp LICENSE.txt "$publish_dir/"

    - name: Copy OpenCvSharp native libraries for Linux
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        publish_dir="Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish"
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libavcodec.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libavformat.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libavutil.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libswscale.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libtesseract.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libgtk-3.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libtiff.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;
        sudo find /usr/lib/x86_64-linux-gnu/ -maxdepth 1 -name "libIlmImf-2_5.so*" -exec cp {} $publish_dir/runtimes/linux-x64/native/ \;

    - name: Patch ELF to use local libraries
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        publish_dir="Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish"
        patchelf --set-rpath '$ORIGIN/runtimes/linux-x64/native' $publish_dir/libOpenCvSharpExtern.so
        patchelf --replace-needed libavcodec.so.58 libavcodec.so.59 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libavformat.so.58 libavformat.so.59 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libavutil.so.56 libavutil.so.57 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libswscale.so.5 libswscale.so.6 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libtesseract.so.4 libtesseract.so.5 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libgtk-x11-2.0.so.0 libgtk-3.so.0 $publish_dir/libOpenCvSharpExtern.so || true
        patchelf --replace-needed libgdk-x11-2.0.so.0 libgdk-3.so.0 $publish_dir/libOpenCvSharpExtern.so || true
      
    - name: Create Release Archive
      shell: pwsh
      run: |
        if ($env:RUNNER_OS -eq "Windows") {
          cd ./Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish
          7z a ../../../../cyz2json-${{ matrix.os }}.zip ./*
        }
        else {
          cd ./Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish
          zip -r ../../../../cyz2json-${{ matrix.os }}.zip ./*
        }
        
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: cyz2json-${{ matrix.os }}
        path: cyz2json-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get release version number
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ github.event.inputs.reason }}
          files: |
            artifacts/cyz2json-ubuntu-latest/cyz2json-ubuntu-latest.zip
            artifacts/cyz2json-windows-latest/cyz2json-windows-latest.zip
            artifacts/cyz2json-macos-latest/cyz2json-macos-latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
