name: Build and release Cyz2Json

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies and Build
      shell: bash
      run: |
        dotnet restore
        dotnet build --no-restore -p:OutputPath=./bin/
      
    - name: Set RID
      id: set-rid
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest) echo "rid=win-x64" >> $GITHUB_OUTPUT ;;
          ubuntu-latest) echo "rid=linux-x64" >> $GITHUB_OUTPUT ;;
          macos-latest)
            if [ "$(uname -m)" = "arm64" ]; then
              echo "rid=osx-arm64" >> $GITHUB_OUTPUT
            else
              echo "rid=osx-x64" >> $GITHUB_OUTPUT
            fi
            ;;
        esac
        
    - name: Publish
      shell: bash
      run: |
        dotnet publish \
          -c Release \
          -r ${{ steps.set-rid.outputs.rid }} \
          --sc true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishReadyToRun=true \
          -p:OutputPath=./bin/${{ steps.set-rid.outputs.rid }}/publish/
          
    - name: Create Release Archive
      shell: pwsh
      run: |
        if ($env:RUNNER_OS -eq "Windows") {
          cd ./Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish
          7z a ../../../../cyz2json-${{ matrix.os }}.zip ./*
        }
        else {
          cd ./Cyz2Json/bin/${{ steps.set-rid.outputs.rid }}/publish
          zip -r ../../../../cyz2json-${{ matrix.os }}.zip ./*
        }
