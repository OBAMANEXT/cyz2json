name: CyzFile-API update

on: 
  workflow_dispatch:
  schedule:
    - cron: '0 8 15 * *'

permissions: 
  contents: write

jobs:
  update_api:
    name: update cyzfile api
    runs-on:
      - ubuntu-latest
    
    steps:
      - name: Checkout cyz2json
        uses: actions/checkout@v6
        
      - name: Fetch latest API release
        run: |
          REPO_OWNER="CytoBuoy"
          REPO_NAME="CyzFile-API"
          TARGET_DIR=Cyz2Json/CyzFile-API

          mkdir -p "$TARGET_DIR"

          # curl -sL "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/releases/latest" | jq -r '.assets[] | select(.name | endswith("7.0.zip")).browser_download_url' | xargs wget -O release.zip
          curl -sL "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/releases/latest" | jq -r '.assets[1].browser_download_url' | xargs wget -O release.zip
          
          unzip -o release.zip -d "$TARGET_DIR"
          rm release.zip

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automatic update of CyzFile-API"
          git push
