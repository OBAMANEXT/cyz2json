name: Build Cyz2Json

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Determine Version
      id: version
      shell: bash
      run: |
        # Version resolution priority:
        # 1. workflow_dispatch input (if provided)
        # 2. git tag (if this is a tag push)
        # 3. PR build with dev version
        # 4. Branch build with dev version
        
        if [ -n "${{ github.event.inputs.version }}" ]; then
          # Manual workflow dispatch with explicit version
          VERSION="${{ github.event.inputs.version }}"
        elif [ "${{ github.ref_type }}" = "tag" ]; then
          # Tag push - use the tag name
          VERSION="${{ github.ref_name }}"
        else
          # Regular branch/PR build - use dev version
          VERSION="0.0.0-dev"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="${VERSION}-pr${{ github.event.number }}-${{ github.sha }}"
          else
            VERSION="${VERSION}-${{ github.sha }}"
          fi
        fi
        
        # Remove 'v' prefix if present
        VERSION="${VERSION#v}"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"

    - name: Restore dependencies
      run: dotnet restore -p:Version=${{ steps.version.outputs.version }}

    - name: Build
      run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

    - name: Set RID
      id: set-rid
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          echo "rid=win-x64" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          echo "rid=linux-x64" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          arch=$(uname -m)
          if [ "$arch" = "arm64" ] || [ "$arch" = "aarch64" ]; then
            echo "rid=osx-arm64" >> $GITHUB_OUTPUT
          else
            echo "rid=osx-x64" >> $GITHUB_OUTPUT
          fi
        fi
      shell: bash

    - name: Publish (RID-specific output)
      run: |
        dotnet publish Cyz2Json/Cyz2Json.csproj \
          -c Release \
          -r ${{ steps.set-rid.outputs.rid }} \
          --self-contained true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishReadyToRun=true \
          -p:Version=${{ steps.version.outputs.version }} \
          -o Cyz2Json/bin/Release/net8.0/${{ steps.set-rid.outputs.rid }}/publish

    - name: Copy License File (Linux / macOS)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        publish_dir="Cyz2Json/bin/Release/net8.0/${{ steps.set-rid.outputs.rid }}/publish"
        mkdir -p "$publish_dir"
        cp LICENSE.txt "$publish_dir/"

    - name: Copy License File (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $destDir = "Cyz2Json\bin\Release\net8.0\${{ steps.set-rid.outputs.rid }}\publish"
        New-Item -ItemType Directory -Force -Path $destDir | Out-Null
        Copy-Item LICENSE.txt -Destination $destDir

    - name: Zip Release Files (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $publishPath = "Cyz2Json\bin\Release\net8.0\${{ steps.set-rid.outputs.rid }}\publish\*"
        Compress-Archive -Path $publishPath -DestinationPath "cyz2json-${{ matrix.os }}.zip" -Force
      shell: pwsh

    - name: Zip Release Files (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd Cyz2Json/bin/Release/net8.0/${{ steps.set-rid.outputs.rid }}/publish
        zip -r ../../../../../../cyz2json-${{ matrix.os }}.zip ./*
      shell: bash

    - name: Check Release
      if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
      id: check_release
      uses: actions/github-script@v6
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const reason = '${{ github.event.inputs.reason }}';
          try {
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: version
            })
            core.setOutput('upload_url', release.data.upload_url.split('{')[0])
          } catch (error) {
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: 'Release ' + version,
              body: reason
            })
            core.setOutput('upload_url', release.data.upload_url.split('{')[0])
          }

    - name: Upload Release Asset
      if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.check_release.outputs.upload_url }}?name=cyz2json-${{ matrix.os }}.zip
        asset_path: cyz2json-${{ matrix.os }}.zip
        asset_name: cyz2json-${{ matrix.os }}.zip
        asset_content_type: application/zip