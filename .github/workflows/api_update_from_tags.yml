name: Update API from Latest Tag

on:
  workflow_dispatch:  
  schedule:
    - cron: '0 8 * * *'  

jobs:
  update-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout of cyz2json
        uses: actions/checkout@v4

      - name: Installer .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Fetch latest tag of CyzFile-API
        run: |
          REPO_OWNER="CytoBuoy"
          REPO_NAME="CyzFile-API"
          TARGET_DIR="Cyz2Json"

          # Clone API repo
          git clone https://github.com/$REPO_OWNER/$REPO_NAME.git external-repo
          cd external-repo

          # Get latest tag
          LATEST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo "Latest tag found : $LATEST_TAG"

          # Checkout the tag
          git checkout $LATEST_TAG

          # Compile the API (only CyzFile)
          dotnet restore

          # Build + publish with custom MSBuild properties
          dotnet msbuild CyzFile/CyzFile.vbproj -target:Publish -p:OutputPath=../../temp_dir/ -p:Configuration=Release -p:TargetFramework=net8.0

          echo "Contenu de ../temp_dir :"
          ls -R ../temp_dir
          
          # Make dir to store publish result and copy
          mkdir -p ../../$TARGET_DIR/$LATEST_TAG
          
          SOURCE_DIR=$(pwd)/../temp_dir/publish
          DEST_DIR=$(pwd)/../../$TARGET_DIR/$LATEST_TAG
          
          echo "Chemin source : $SOURCE_DIR"
          echo "Chemin destination : $DEST_DIR"
          
          if [ -d "$SOURCE_DIR" ]; then
            echo "Copie des fichiers depuis $SOURCE_DIR vers $DEST_DIR"
            cp -r "$SOURCE_DIR"/. "$DEST_DIR/"
          else
            echo "Erreur : Le dossier source $SOURCE_DIR n'existe pas."
            exit 1
          fi
          
          # Clean cloned repo
          cd ..
          rm -rf external-repo
          rm -rf temp_dir

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automatic update of CyzFile-API from latest tag"
          git push
